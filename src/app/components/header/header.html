<header class="app-header">
  <div class="header-inner">

    <!-- Logos + Marca + Toggle em linha única -->
    <div class="header-brand-row">
      <img src="assets/logo-PMBP.png" alt="Prefeitura Municipal de Barra do Piraí" class="logo-pmbp" />

      <div class="header-brand">
        <h1 class="header-title">Ramais VoIP</h1>
        <span class="header-subtitle">Prefeitura Municipal de Barra do Piraí</span>
      </div>

      <div class="header-end">
        <img src="assets/logo_horizontal.png" alt="LOGNET" class="logo-lognet" />
        <button
          class="theme-toggle"
          type="button"
          (click)="theme.toggle()"
          [attr.aria-label]="theme.isDark() ? 'Mudar para tema claro' : 'Mudar para tema escuro'"
          [attr.aria-pressed]="theme.isDark()">
          @if (theme.isDark()) {
            <i class="fas fa-sun" aria-hidden="true"></i>
          } @else {
            <i class="fas fa-moon" aria-hidden="true"></i>
          }
        </button>
      </div>
    </div>

    <!-- Faixa de contato -->
    <div class="contact-strip">
      <a href="tel:08000000192" class="contact-phone" aria-label="Ligar para 0800 000 0192">
        <span class="contact-icon"><i class="fas fa-phone-volume" aria-hidden="true"></i></span>
        <span class="phone-number">0800 000 0192</span>
      </a>
      <span class="contact-sep" aria-hidden="true"></span>
      <span class="contact-schedule">
        <i class="fas fa-clock" aria-hidden="true"></i>
        <span>Seg – Sáb &nbsp;·&nbsp; 09h às 18h</span>
      </span>
    </div>

  </div>
</header>
